name: Nightly Full Tests

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  full-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [ '10.0' ]

    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET Core SDK ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Install dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Full test suite (including Slow)
        run: dotnet test --no-restore --verbosity normal --settings test.all.runsettings
      - name: Crash recovery suite
        run: dotnet test Ocis.Tests/Ocis.Tests.fsproj --no-restore --no-build --verbosity normal --filter "TestCategory=CrashRecovery"
      - name: Soak smoke hook
        run: bash scripts/soak-smoke.sh
