name: Nightly Release

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  check-commits:
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.check.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          COUNT=$(git log --since="$YESTERDAY" --oneline | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

  build:
    needs: check-commits
    if: needs.check-commits.outputs.count > '0'
    strategy:
      matrix:
        # Using ubuntu-22.04 runner (glibc 2.31) for Linux builds to ensure compatibility
        # with older Linux systems. Ubuntu 24.04 uses glibc 2.38+ which may not be available
        # on older distributions.
        runtime: [linux-x64, osx-x64, win-x64]
    runs-on: ${{ matrix.runtime == 'win-x64' && 'windows-latest' || (matrix.runtime == 'osx-x64' && 'macos-latest' || 'ubuntu-22.04') }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - name: Publish
        run: |
          dotnet publish Ocis.Server/Ocis.Server.fsproj -c Release -r ${{ matrix.runtime }} -p:PublishAot=true --self-contained true -o publish/${{ matrix.runtime }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ocis.Server-${{ matrix.runtime }}
          path: |
            publish/${{ matrix.runtime }}/Ocis.Server
            publish/${{ matrix.runtime }}/Ocis.Server.exe

  release:
    needs: [check-commits, build]
    if: needs.check-commits.outputs.count > '0'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: Ocis.Server-*
          merge-multiple: false
      
      - name: List downloaded files
        run: find artifacts -type f
      
      - name: Prepare release
        id: prepare
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          git log --since="$YESTERDAY" --format='- %s' > commits.txt
      
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.prepare.outputs.date }}-nightly"
          # Delete existing release if exists
          gh release delete "$TAG" --yes || true
          # Create release without files first
          gh release create "$TAG" \
            --title "${{ steps.prepare.outputs.date }} Nightly Build" \
            --notes-file commits.txt \
            --draft
          
      - name: Upload Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.prepare.outputs.date }}-nightly"
          # Upload each artifact with unique name (including platform)
          for f in $(find artifacts -type f \( -name "Ocis.Server" -o -name "Ocis.Server.exe" \)); do
            # Extract platform from path (e.g., "linux-x64", "osx-x64", "win-x64")
            PLATFORM=$(echo "$f" | sed -E 's|artifacts/Ocis.Server-([^/]+)/.*|\1|')
            # Determine file extension
            if [[ "$f" == *.exe ]]; then
              ASSET_NAME="Ocis.Server-$PLATFORM.exe"
            else
              ASSET_NAME="Ocis.Server-$PLATFORM"
            fi
            # Copy with unique name and upload
            cp "$f" "/tmp/$ASSET_NAME"
            gh release upload "$TAG" "/tmp/$ASSET_NAME" --clobber
          done