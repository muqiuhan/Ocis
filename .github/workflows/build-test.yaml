name: Build and Test

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [ '10.0' ]

    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET Core SDK ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Set up Clang
        uses: egor-tensin/setup-clang@v1
        with:
          version: latest
          platform: x64
      - name: Install dependencies
        run: dotnet restore
      - name: Install dotnet tools
        run: dotnet tool restore
      - name: Install fsharplint
        run: dotnet tool install --tool-path ~/.local/bin dotnet-fsharplint
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
      - name: Lint F# code
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          dotnet fsharplint lint Ocis/Ocis.fsproj
          dotnet fsharplint lint Ocis.Tests/Ocis.Tests.fsproj
          dotnet fsharplint lint Ocis.Server/Ocis.Server.fsproj
          dotnet fsharplint lint Ocis.Server.Tests/Ocis.Server.Tests.fsproj
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Fast test suite (excludes Slow)
        run: dotnet test --no-restore --verbosity normal --settings test.fast.runsettings
      - name: Crash recovery gate
        run: dotnet test Ocis.Tests/Ocis.Tests.fsproj --no-restore --no-build --verbosity normal --filter "TestCategory=CrashRecovery"

  generate-sdk:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0'
      - name: Install fable
        run: dotnet tool install -g fable
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
      - name: Build and test Ocis.Client.SDK
        run: cd Ocis.Client && dotnet build -c Release && dotnet test
      - name: Generate SDK
        run: cd Ocis.Client && ./generate-sdk.sh
